<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f5;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            width: 550px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            padding: 0;
        }

        .header {
            background: #f97316;
            padding: 25px;
            text-align: center;
        }

        .header h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .fields-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 30px;
        }

        .field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .field label {
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
            width: 35%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field .value {
            width: 65%;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 10px;
            color: #1e293b;
            font-size: 1rem;
            font-weight: 500;
            word-break: break-word;
            text-align: right;
        }

        .value#balance {
            font-weight: 700;
            color: #f97316;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>User Profile</h2>
        </div>
        <div class="fields-container">
            <div class="field">
                <label>uname</label>
                <div class="value" id="uname"></div>
            </div>
            <div class="field">
                <label>age</label>
                <div class="value" id="age"></div>
            </div>
            <div class="field">
                <label>city</label>
                <div class="value" id="city"></div>
            </div>
            <div class="field">
                <label>phonenumber</label>
                <div class="value" id="phonenumber"></div>
            </div>
            <div class="field">
                <label>accno</label>
                <div class="value" id="accno"></div>
            </div>
            <div class="field">
                <label>pin</label>
                <div class="value" id="pin"></div>
            </div>
            <div class="field">
                <label>balance</label>
                <div class="value" id="balance"></div>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const useracc = params.get("accno");
        const userpin = params.get("pin");

        function profile(){
            url = "http://localhost:8080/user_details?accno=" + useracc;

            fetch(url,{
                method : 'GET'
            })
            .then(response => response.text())
            .then(data => {
                let userdata = data.split(",")
                let uname = userdata[0];
                let age = userdata[1];
                let city = userdata[2];
                let phone = userdata[3]
                let bal = userdata[4];
                document.getElementById("accno").innerHTML = useracc;
                document.getElementById("pin").innerHTML = userpin;
                document.getElementById("uname").innerHTML = uname;
                document.getElementById("age").innerHTML = age;
                document.getElementById("city").innerHTML = city;
                document.getElementById("phonenumber").innerHTML = phone;
                document.getElementById("balance").innerHTML = bal;
            })
            .catch(error => {
                showToast("error in fetching the user details !!")
            });
        }

        profile()
    </script>
</body>
</html>
