<!DOCTYPE html>
<html>
<head>
    <title>Number Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .heading {
            background-color: #ff9800;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">PIN UPDATE</div>
        <div class="content">
            <!-- <div class="input-group">
                <label>Enter Accno : </label>
                <input type="text" id="useracc" placeholder="Acc00000001">
            </div> -->
            <div class="input-group">
                <label>Enter new pin : </label>
                <input type="number" id="pin1" placeholder="0000">
            </div>
            <div class="input-group">
                <label>Confirm pin : </label>
                <input type="number" id="pin2" placeholder="0000">
            </div>
            <button type="button" onclick="update_pin()">Update</button>
        </div>
    </div>

    <script>
        //these parameters we would get from the redirection url ,because in the redirection url along with the dest html file we also included these paremeeter as key value pairts ,so by using thekey we can accesss the values , this is callled parameter chainging 
        const params = new URLSearchParams(window.location.search);
        const accno = params.get("accno");
        //const pin = params.get("pin");

        function update_pin(){
            //let accno = document.getElementById("useracc").value;
            let pin1 = document.getElementById("pin1").value;
            let pin2 = document.getElementById("pin2").value;

            


            if(accno=="" || pin1=="" || pin2==""){
                showToast("please enter all fields !!")
            }
            else if (pin1.length!=4 || pin2.length!=4){
                showToast("please enter the pin of valid length !!")
            }
            else if(pin1!=pin2){
                showToast("please enter the same pins !!")
            }
            else{

                //input are of valid length - frontend check completed

                //backend check - now check whether the accno is present in db or not

                url = "http://localhost:8080/check_accno?accno="+ accno

                //check whether accno is present in the database - get request

                fetch(url,{
                    method : 'get'
                })

                .then(response => response.text()) //response would be text
                .then(data => {
                    if(data=="true"){
                        //correct accno
                        //now accno is correct - update the pin at that accno

                        url = "http://localhost:8080/updatepin"

                        // body - accno and newpin , patch

                        let userdata = {
                            accno: accno,
                            newpin: pin1
                        };

                        fetch(url,{
                            method : 'PATCH',
                            headers : {
                                'Content-Type': 'application/json'
                            },
                            body : JSON.stringify(userdata)
                        })

                        .then(response => response.text())

                        .then(data => {
                            showToast(data)
                        })

                        .catch(error => {
                            showToast("error in updating the pin !!")
                        });




                    }
                    else{
                        showToast("please enter valid accno !!")
                    }
                })

                .catch(error => {
                        showToast("error in validating the accno !!")
                    });

            }//else


        }
        function showToast(msg) {
            let toast = document.createElement("div");
            toast.innerHTML = msg;
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.right = "20px";
            toast.style.backgroundColor = "#333";
            toast.style.color = "white";
            toast.style.padding = "12px 20px";
            toast.style.borderRadius = "5px";
            toast.style.fontSize = "14px";
            toast.style.zIndex = "9999";
            toast.style.boxShadow = "0 2px 5px rgba(0,0,0,0.2)";
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
