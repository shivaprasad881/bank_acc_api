<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f5;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container {
            width: 800px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .heading {
            background: #f97316;
            padding: 20px;
            text-align: center;
        }

        .heading h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #334155;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 15px;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Transactions</h1>
        </div>
        <table>
            <thead>
                <tr>
                    <th>tar_acc</th>
                    <th>amount</th>
                    <th>category</th>
                </tr>
            </thead> 
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const useracc = params.get("accno");

        //now find all the transactions of the current account and render

        // get http method 

        let url = "http://localhost:8080/user_transactions?accno=" + useracc

        fetch(url,{
            method : 'GET'
        })

        .then(response => response.json())

        .then(jsondata => {

            // iterating through each transaction record at a time
            for(let i=0;i<jsondata.length;i++){

                let tar_acc_value = jsondata[i].tarAcc
                let amount_value = jsondata[i].amount
                let transaction_type_value = jsondata[i].transactionType


                document.getElementById("tableBody").innerHTML += `
                <tr>
                    <td>${tar_acc_value}</td>
                    <td>${amount_value}</td>
                    <td>${transaction_type_value}</td>
                </tr>
                `

            }
            
        })

        .catch(error => {
            showToast("error in fetching the history !!")
        });

        
    </script>
</body>
</html>
