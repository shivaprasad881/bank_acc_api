<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Page</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>User Profile</h2>
        </div>
        <div class="fields-container">
            <div class="field">
                <label>uname</label>
                <div class="value" id="uname"></div>
            </div>
            <div class="field">
                <label>age</label>
                <div class="value" id="age"></div>
            </div>
            <div class="field">
                <label>city</label>
                <div class="value" id="city"></div>
            </div>
            <div class="field">
                <label>phonenumber</label>
                <div class="value" id="phonenumber"></div>
            </div>
            <div class="field">
                <label>accno</label>
                <div class="value" id="accno"></div>
            </div>
            <div class="field">
                <label>pin</label>
                <div class="value" id="pin"></div>
            </div>
            <div class="field">
                <label>balance</label>
                <div class="value" id="balance"></div>
            </div>
        </div>
    </div>
    <script src="../js/toast.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
