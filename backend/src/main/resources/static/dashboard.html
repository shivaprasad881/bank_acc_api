<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .dashboard {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .update-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .update-btn:hover {
            background-color: #e68900;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        
        .box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            margin-top: 20px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .action-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <button class="update-btn" type="button" onclick="update_Pin()">Update Pin</button>
        <h1>Dashboard</h1>
        <div class="box">
            Hello!
        </div>
        <div class="button-container">
            <button class="action-btn" onclick="check_balance()">Check Balance</button>
            <button class="action-btn" onclick="deposit_money()">Deposit</button>
            <button class="action-btn" onclick="withdrawl_money()">With-drawl</button>
            <button class="action-btn"  type="button"  onclick="transfer()">Transfer</button>
        </div>
    </div>

    <script>
        //once we define here - then it can be used in any js functions and so in nested js functions
        const params = new URLSearchParams(window.location.search);
        const useracc = params.get("accno");
        const userpin = params.get("pin");

        function update_Pin(){
            window.location.href = "updatepin.html?accno=" + useracc + "&pin=" + userpin  ;
        }

        function check_balance() {
            url = "http://localhost:8080/check_balance?accno=" + useracc
            
            //it is get method
            fetch(url,{
                method : 'get'
            })

            .then(response => response.text())

            .then(data =>{
                showToast(data)
            })

            .catch(error => {
                    showToast("error in fetching the balance !!")
            });

        }//checkbalance

        function deposit_money() {
            window.location.href = "deposit.html?accno=" + useracc ;
        }

        function withdrawl_money() {
            window.location.href = "withdrawl.html?accno=" + useracc ;
        }

        function transfer() {
            window.location.href = "transfer.html?accno=" + useracc ;
        }

        function showToast(message) {
            // Create toast element
            const toast = document.createElement('div');
            toast.textContent = message;
            
            // Style the toast
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#333';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.fontSize = '14px';
            toast.style.fontFamily = 'system-ui, sans-serif';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
            
            // Add to body
            document.body.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

       
    </script>
</body>
</html>
