<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>User Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .orange-heading {
            background-color: #f97316;
            padding: 1.5rem 1.8rem;
            text-align: center;
        }

        .orange-heading h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            margin: 0;
            letter-spacing: -0.2px;
        }

        .input-section {
            padding: 2rem 2rem 2.2rem;
        }

        .field {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        .field input {
            padding: 0.85rem 1.1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 1rem;
            font-family: inherit;
            background-color: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #1e293b;
            width: 100%;
        }

        .field input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
            background-color: #fffaf5;
        }

        .field input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
        }

        .field input[type="number"] {
            -moz-appearance: textfield;
        }

        .field input[type="number"]::-webkit-inner-spin-button,
        .field input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }

        .submit-btn {
            width: 100%;
            background-color: #f97316;
            border: none;
            padding: 0.85rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background-color: #ea580c;
            transform: scale(0.98);
        }

        .submit-btn:active {
            background-color: #c2410c;
            transform: scale(0.97);
        }

        @media (max-width: 550px) {
            .input-section {
                padding: 1.6rem;
            }
            .orange-heading h1 {
                font-size: 1.5rem;
            }
            .field input {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="orange-heading">
        <h1>User Details</h1>
    </div>

    <div class="input-section">
        <div class="field">
            <label>Full Name</label>
            <input type="text" id="uname" placeholder="Enter your full name">
        </div>

        <div class="field">
            <label>Age</label>
            <input type="number" id="age" placeholder="Enter your age">
        </div>

        <div class="field">
            <label>City</label>
            <input type="text" id="city" placeholder="Enter your city">
        </div>

        <div class="field">
            <label>Phone Number</label>
            <input type="text" id="phonenumber" placeholder="Enter your phone number">
        </div>

        <button type="button" onclick="user_signup()">Submit</button>
    </div>

    <script>
    function user_signup(){
        let uname = document.getElementById('uname').value;
        let age = document.getElementById('age').value;
        let city = document.getElementById('city').value;
        let phonenumber = document.getElementById('phonenumber').value;

        if(uname == "" || age == "" || parseInt(age) <= 0 || city == "" || phonenumber == "" || phonenumber.length != 10){
            showToast("please enter valid details !!")  // ← Fixed: toast → showToast
        }
        else{
            let url = "http://localhost:8080/register"

            let userData = {
                uname: uname,
                age: age,
                city: city,
                phonenumber: phonenumber
            };

            fetch(url,{
                method : 'post',
                headers: {
                    "Content-Type": "application/json"
                },
                body : JSON.stringify(userData)
            })
            .then(response => response.text())
            .then(data => {
                showToast(data)

                 
                     setTimeout(() => {
                        window.location.href = "signin.html";
                    }, 4000);
                

            })
            .catch(error => {
                showToast("error !!")
            });
        }
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#333';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '8px';
        toast.style.fontSize = '14px';
        toast.style.fontFamily = 'system-ui, sans-serif';
        toast.style.zIndex = '9999';
        toast.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 4000);
    }
</script>

</div>

</body>
</html>
