<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Container</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f5;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        .container {
            width: 450px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .heading {
            background: #f97316;
            padding: 20px;
            text-align: center;
        }

        .heading h1 {
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
        }

        .content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-weight: 500;
            color: #334155;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        button {
            background: #f97316;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #ea580c;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            text-align: center;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Money Transfer</h1>
        </div>
        <div class="content">
            <div class="input-group">
                <label>To whom : </label>
                <input type="text" id="taracc" placeholder="ACC00000001">
            </div>
            <div class="input-group">
                <label>Enter amount : </label>
                <input type="number" id="useramount" placeholder="1000/-">
            </div>
            <button onclick="transfer()">Transfer</button>
            

        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const useracc = params.get("accno");

        function transfer(){
            let tar_acc = document.getElementById("taracc").value;
            let tar_amt = document.getElementById("useramount").value;

            //the user want to transfer money from his account to another account 
            //note : user account would definetely exist as we are witin hte user itself
            // now check whether user had enough amount to transfer 
            // no : u dont have enought balance
            // yes :  u can able to tranfer
            // but now we need to check whether the dest user exists
            //no : enter correct accno
            //yes : we can transfer money

            //now both users exist and the cur user had enough money to transfer - now start transaction
            
            // first debit money from the user
            //now credit money to the dest user

            //we would look at failure transactions afterwords


            let int_amt = parseInt(tar_amt);
            
            if(tar_acc=="" || tar_amt=="" || int_amt<=0 ){
                showToast("please enter valid details!!")
            }
            else{
                // valid data

                // now get the user balance

                url = "http://localhost:8080/check_balance?accno=" + useracc
            
                
                fetch(url,{
                    method : 'get'
                })

                .then(response => response.text())

                .then(data =>{
                
                    //succesfully fecthed user balance
                    let bal = parseFloat(data);
                    if(bal>=tar_amt){
                        //user had enought bal to transfer

                        //now check whether dest user exists or not

                        url = "http://localhost:8080/check_accno?accno=" + tar_acc 

                        //get method - pass acc witin url
                        fetch(url,{
                            method : 'get'
                        })

                        .then(response => response.text())

                        .then(data =>{
                            if(data=="true"){
                                //tar acc is existing 
                                //now both acc existing and user had enough bal - we can do trasaction

                                // 1.debit from cur user 

                                url = "http://localhost:8080/withdrawl"

                                //as we are updating an attribute it is patch - pass input accno and withdrwal amt as body

                                let userdata = {
                                    accno: useracc,
                                    amount: tar_amt
                                };

                                fetch(url,{
                                    method : 'PATCH',
                                    headers : {
                                        "Content-Type": "application/json"
                                    },
                                    body : JSON.stringify(userdata)
                                })

                                .then(response => response.text())

                                .then(data => {
                                    // withdrawl is successfull 

                                    //---- now deposit the amount in the tar acc----

                                    url = "http://localhost:8080/deposit"

                                    //as we are updating a attribute - this is patch - pass input in body

                                    userdata = {// deposit into tar account
                                        accno: tar_acc,
                                        amount: tar_amt
                                    };

                                    fetch(url,{
                                        method : 'PATCH',
                                        headers : {
                                            "Content-Type": "application/json"
                                        },
                                        body : JSON.stringify(userdata)
                                    })

                                    .then(response => response.text())

                                    .then(data => {
                                        // successfully credited the amt in tar acc

                                        // we are done with the transaction - debited from user and credited into tar acc
                                        showToast("Transaction successfull !!")
                                    })

                                    .catch(error => {
                                        showToast("error in crediting amount to target account !!")
                                    });



                                })

                                .catch(error => {
                                    showToast("error in  withdrawing amount from user !!")
                                });



                            }
                            else{
                                showToast("Destination account not existing !!")
                            }
                        })

                        .catch(error => {
                            showToast("error in checking the presence of destination user !!")
                        });

                    }
                    else{
                        showToast("Insufficient balance !!")
                    }
                })

                .catch(error => {
                        showToast("error in fetching the user balance !!")
                });

            }

        }


        function showToast(message) {
            // Create toast element
            const toast = document.createElement('div');
            toast.textContent = message;
            
            // Style the toast
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#333';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.fontSize = '14px';
            toast.style.fontFamily = 'system-ui, sans-serif';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
            
            // Add to body
            document.body.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
