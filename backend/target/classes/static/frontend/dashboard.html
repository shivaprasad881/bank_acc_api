<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard">
        <div class="button-group">
            
            <button class="update-btn" type="button" onclick="update_pin_dash(true)">Update Pin</button>
            <button class="btn" type="button" onclick="profile()">Profile</button>
        </div>
        
        <h1>Dashboard</h1>
        <div class="box">
            Hello!
        </div>
        <div class="button-container">
            <button class="action-btn" onclick="check_balance(true)">Check Balance</button>
            <button class="action-btn" onclick="deposit_dash()">Deposit</button>
            <button class="action-btn" onclick="withdrawl_dash()">With-drawl</button>
            <button class="action-btn" onclick="transfer_dash()">Transfer</button>
            <button class="action-btn" onclick="history()">History</button>
        </div>
    </div>
    <script src="../js/toast.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
