<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Page</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>User Profile</h2>
        </div>
        <div class="fields-container">
            <div class="field">
                <label>Username</label>
                <div class="value" id="uname"></div>
            </div>
            <div class="field">
                <label>Age</label>
                <div class="value" id="age"></div>
            </div>
            <div class="field">
                <label>City</label>
                <div class="value" id="city"></div>
            </div>
            <div class="field">
                <label>Phonenumber</label>
                <div class="value" id="phonenumber"></div>
            </div>
            <div class="field">
                <label>Accno</label>
                <div class="value" id="accno"></div>
            </div>
        </div>
    </div>
    <script src="../js/toast.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
