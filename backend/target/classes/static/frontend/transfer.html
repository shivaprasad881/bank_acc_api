<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Container</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Money Transfer</h1>
        </div>
        <div class="content">
            <div class="input-group">
                <label>To whom : </label>
                <input type="text" id="taracc" placeholder="ACC00000001">
            </div>
            <div class="input-group">
                <label>Enter amount : </label>
                <input type="number" id="useramount" placeholder="1000/-">
            </div>
            <button onclick="transfer()">Transfer</button>
            

        </div>
    </div>

    <script src="../js/transfer.js"></script>
</body>
</html>
