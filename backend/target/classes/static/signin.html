<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Container - Orange Header</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Only one square container in the middle with orange heading at top -->
  <div class="container">

    <div class="orange-heading">
      <h1>Container Title</h1>
    </div>

    <div class="content">

      <div class="input-group">
        <label for="user_acc">Account number :</label>
        <input type="text" id="user_acc" placeholder="Acc000000">
      </div>

      <div class="input-group">
        <label for="pin">PIN:</label>
        <input type="number" id="pin" name="pin" inputmode="numeric" pattern="[0-9]*" placeholder="Enter PIN">
      </div>

      <button type="button" onclick="user_signin()">Login</button>
      <!-- <div class="accent-line"></div> -->


      <a href="signup.html">signup</a>

    </div>

  </div>
  <script>
        function user_signin(){
            let useracc = document.getElementById("user_acc").value
            let userpin = document.getElementById("pin").value
            
            if(useracc=="" || userpin=="" || userpin.length!=4){
                showToast("please fill the detials")
            }else{
                //check whether the username and pin exists
                



                // const name = 'John';
                // const age = 25;
                // fetch(`http://localhost:8080/api/employees?name=${name}&age=${age}`)

                let url = "http://localhost:8080/check?accno=" + useracc + "&pin=" + userpin

                fetch(url,{
                  method : 'get'

                })
                .then(response => response.text())
                .then(data => {
                    if(data=="true"){
                        //user present
                        showToast("succesfull login!!")

                        setTimeout(() => {
                            window.location.href = "dashboard.html?accno=" + useracc + "&pin=" + userpin ;
                        }, 3000);

                    }
                    else{
                        showToast("invalid credentials!!")
                    }
                })

                .catch(error => {
                    showToast("error in singin !!")
                });
            }
        }

        function showToast(message) {
            // Create toast element
            const toast = document.createElement('div');
            toast.textContent = message;
            
            // Style the toast
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#333';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.fontSize = '14px';
            toast.style.fontFamily = 'system-ui, sans-serif';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
            
            // Add to body
            document.body.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }


  </script>
</body>
</html>
