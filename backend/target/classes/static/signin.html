<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Container - Orange Header</title>
  <style>
    /* Minimal centering setup */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eef2f5;
      font-family: system-ui, 'Segoe UI', sans-serif;
    }
    /* Square container with increased height & minimal colors */
    .container {
      width: 500px;
      height: 500px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }
    /* Orange heading at the top of container */
    .orange-heading {
      background: #f97316;
      padding: 20px 24px;
      text-align: center;
    }
    .orange-heading h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 600;
      color: white;
      letter-spacing: -0.3px;
    }
    /* Content area below heading - centered vertically */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      gap: 16px;
    }
    /* Form styling for interactive elements */
    .input-group {
      width: 80%;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #334155;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    .input-group input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
    }
    .input-group input:hover {
      border-color: #f97316;
    }
    button {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    button:hover {
      background: #ea580c;
      transform: scale(1.02);
    }
    button:active {
      transform: scale(0.98);
    }
    /* Small accent line */
    .accent-line {
      width: 50px;
      height: 3px;
      background: #f97316;
      border-radius: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- Only one square container in the middle with orange heading at top -->
  <div class="container">

    <div class="orange-heading">
      <h1>Container Title</h1>
    </div>

    <div class="content">

      <div class="input-group">
        <label for="user_acc">Account number :</label>
        <input type="text" id="user_acc" placeholder="Acc000000">
      </div>

      <div class="input-group">
        <label for="pin">PIN:</label>
        <input type="number" id="pin" name="pin" inputmode="numeric" pattern="[0-9]*" placeholder="Enter PIN">
      </div>

      <button type="button" onclick="user_signin()">Login</button>
      <!-- <div class="accent-line"></div> -->


      <a href="signup.html">signup</a>

    </div>

  </div>
  <script>
        function user_signin(){
            let useracc = document.getElementById("user_acc").value
            let userpin = document.getElementById("pin").value
            
            if(useracc=="" || userpin=="" || userpin.length!=4){
                showToast("please fill the detials")
            }else{
                //check whether the username and pin exists
                



                // const name = 'John';
                // const age = 25;
                // fetch(`http://localhost:8080/api/employees?name=${name}&age=${age}`)

                let url = "http://localhost:8080/check?accno=" + useracc + "&pin=" + userpin

                fetch(url,{
                  method : 'get'

                })
                .then(response => response.text())
                .then(data => {
                    if(data=="true"){
                        //user present
                        showToast("succesfull login!!")

                        setTimeout(() => {
                            window.location.href = "dashboard.html?accno=" + useracc + "&pin=" + userpin ;
                        }, 3000);

                    }
                    else{
                        showToast("invalid credentials!!")
                    }
                })

                .catch(error => {
                    showToast("error in singin !!")
                });
            }
        }

        function showToast(message) {
            // Create toast element
            const toast = document.createElement('div');
            toast.textContent = message;
            
            // Style the toast
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#333';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '8px';
            toast.style.fontSize = '14px';
            toast.style.fontFamily = 'system-ui, sans-serif';
            toast.style.zIndex = '9999';
            toast.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
            
            // Add to body
            document.body.appendChild(toast);
            
            // Remove after 3 seconds
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }


  </script>
</body>
</html>
