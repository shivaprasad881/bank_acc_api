<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- add this in your HTML head -->

    <script src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>Transaction Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f5;
            font-family: system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
            position: relative;
        }

        .top-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
        }

        .top-btn:hover {
            background: #ea580c;
        }

        .container {
            width: 800px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .heading {
            background: #f97316;
            padding: 20px;
            text-align: center;
        }

        .heading h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #334155;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 12px 15px;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <button class="top-btn" onclick="download()">⬇️Download</button>

    <div class="container">
        <div class="heading">
            <h1>Transactions</h1>
        </div>
        <table>
            <thead>
                <tr>
                    <th>From account</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                </tr>
            </thead> 
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const useracc = params.get("accno");

        let data;

        function goBack() {
            window.location.href = "dashboard.html?accno=" + useracc;
        }

        let url = "http://localhost:8080/user_transactions?accno=" + useracc

        fetch(url,{
            method : 'GET'
        })

        .then(response => response.json())

        .then(jsondata => {
            data = jsondata
            for(let i=0;i<jsondata.length;i++){

                let tar_acc_value = jsondata[i].tarAcc
                let amount_value = jsondata[i].amount
                let transaction_type_value = jsondata[i].transactionType
                let transaction_date_value = jsondata[i].transactionDate

                let updated = transaction_date_value.substring(0,10) + " " + transaction_date_value.substring(11,19)

                document.getElementById("tableBody").innerHTML += `
                <tr>
                    <td>${tar_acc_value}</td>
                    <td>${amount_value}</td>
                    <td>${transaction_type_value}</td>
                    <td>${updated}</td>
                </tr>
                `
            }
        })

        .catch(error => {
            showToast("error in fetching the history !!")
        });


        function download(){
            // we need to include all the transactions of the user in a pdf and download it
            const doc = new jspdf.jsPDF();


            // x should remain 10 but y would be increment by 10

            doc.text("Transaction records ",45,10)
            
            let y = 20

            for(let i=0;i<data.length;i++){
                //each json object
                let str = JSON.stringify(data[i]) // each json object converted into string

                
                //each line can hold 80 characters only
                

                str = (i+1) + "].   " + str

                let len = str.length


                let start = 0

                while(len>70){
                    doc.text(str.substring(start,start+70)   ,10,y)

                    len -= 70

                    y += 8

                    start += 70
                }

                if(len!=0){
                    //still some thing left - add it in new line
                    doc.text(str.substring(start) ,10,y )
                }

                y += 11

            }

            doc.save("first.pdf")
        }


    </script>
</body>
</html>
